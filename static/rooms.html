<!DOCTYPE html>
<html>
<head>
<title>Rooms</title>
<link rel="stylesheet" href="/static/styles.css">
</head>

<body>

<div class="container">

<!-- SIDEBAR -->
<div class="sidebar">
<img src="/static/logo.png" class="logo">
<h3>HostelSys</h3>

<ul>
<li><a href="/static/index.html"><img src="/static/dashboard.png"> Dashboard</a></li>
<li><a href="/static/students.html"><img src="/static/student.png"> Students</a></li>
<li class="active"><a href="#"><img src="/static/room.png"> Rooms</a></li>
<li><a href="/static/allocation.html"><img src="/static/allocation.png"> Allocation</a></li>
<li><a href="/static/dues.html"><img src="/static/dues.png"> Dues</a></li>
</ul>
</div>

<!-- MAIN -->
<div class="main">

<h1>Rooms</h1>

<!-- FILTERS -->
<input id="search" placeholder="Search Room ID..." onkeyup="load()">

<select id="genderFilter" onchange="load()">
<option value="">All</option>
<option value="Male">Male</option>
<option value="Female">Female</option>
</select>

<br><br>

<!-- ROOM CARDS -->
<div id="list" style="display:grid; grid-template-columns: repeat(auto-fit, minmax(250px,1fr)); gap:20px;"></div>

</div>
</div>

<script>

const API = "http://127.0.0.1:8001";

async function load(){

let res = await fetch(API + "/rooms/all");
let data = await res.json();

let search = document.getElementById("search").value.toLowerCase();
let gender = document.getElementById("genderFilter").value;

let html = "";

data.forEach(r => {

if(
r.id.toString().includes(search) &&
(gender=="" || r.gender===gender)
){

let members = r.members.length
? r.members.map(m => `<div>👤 ${m}</div>`).join("")
: "<div>No members</div>";

html += `
<div class="card">

<h3>Room ${r.id}</h3>

<p><b>Type:</b> ${r.type}</p>
<p><b>Gender:</b> ${r.gender}</p>

<p><b>Capacity:</b> ${r.capacity}</p>
<p><b>Available Beds:</b> ${r.available}</p>

<hr>

<h4>Members</h4>
${members}

</div>
`;

}

});

document.getElementById("list").innerHTML = html || "No rooms found";

}

load();

</script>

</body>
</html>
